{% extends 'songs/base.html' %}

{% block title %}Удалить {{ song.title }}{% endblock %}

{% block content %}
<div class="row">
    <div class="col-lg-6 mx-auto">
        <div class="card shadow-sm border-danger">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0"><i class="bi bi-exclamation-triangle"></i> Подтверждение удаления</h4>
            </div>
            <div class="card-body text-center">
                <h5>Вы уверены, что хотите удалить?</h5>
                <div class="p-3 bg-light rounded">
                    <h4>{{ song.title }}</h4>
                    <p class="text-muted">{{ song.artist }}</p>
                </div>
                
                <form method="post" class="mt-3">
                    {% csrf_token %}
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-danger">
                            <i class="bi bi-trash"></i> Да, удалить
                        </button>
                        <a href="{% url 'songs:song_detail' pk=song.pk %}" class="btn btn-secondary">
                            <i class="bi bi-x-circle"></i> Отмена
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
